services:
  mini-proxy:
    container_name: mini-proxy
    build: .
    ports:
      - "${PROXY_RELAY_PORT:-8080}:8080"     # REST relay
      - "${PROXY_CONNECT_PORT:-8888}:8888" # CONNECT proxy (si PROXY_CONNECT_ENABLED=true)
    restart: unless-stopped
    environment:
      - HOST=${HOST:-0.0.0.0}
      - PROXY_CONNECT_ENABLED=${PROXY_CONNECT_ENABLED:-false}
      - PROXY_CONNECT_PORT=8888
      - PROXY_RELAY_PORT=8080
      - PROXY_TOKEN=${PROXY_TOKEN:-}
      - PROXY_ALLOWED_HOSTS=${PROXY_ALLOWED_HOSTS:-}
      - PROXY_LOG_LEVEL=${PROXY_LOG_LEVEL:-INFO}
      - PROXY_RATE_LIMIT_RPM=${PROXY_RATE_LIMIT_RPM:-60}
    networks: 
      ai-network:
        ipv4_address: 172.18.0.29

networks: 
  ai-network:
    external: true