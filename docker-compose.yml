services:
  mini-proxy:
    container_name: mini-proxy
    build: .
    ports:
      - "${PROXY_RELAY_PORT:-8080}:8080"     # REST relay
      - "${PROXY_CONNECT_PORT:-8888}:8888" # CONNECT proxy (si PROXY_CONNECT_ENABLED=true)
    restart: unless-stopped
    networks: 
      ai-network:
        ipv4_address: 172.18.0.29

networks: 
  ai-network:
    external: true